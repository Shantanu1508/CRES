<script src="js/powerbi/jquery.js"></script>
<script src="js/powerbi/angular.js"></script>
<script src="js/powerbi/powerbi.js"></script>
<script src="js/powerbi/angular-powerbi.js"></script>
<style type="text/css">
    .reportiframe {
        border: 0;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100% !important;
        height: 100vh !important;
    }
</style>
<div ng-app="AngularAuthApp">
    <div ng-controller="reportController" id="reportdiv" class="reportiframe">
        <powerbi-report embed-url="{{embedUrl}}" access-token="{{accessToken}}">
        </powerbi-report>
    </div>
</div>
<script type="text/javascript">
    setTimeout(getIframe(), 10);

    var app = angular.module('AngularAuthApp', ["powerbi"]);
    app.controller("reportController", function ($http, $scope) {
        var user = localStorage.getItem('user')
        var powerbiReportId = localStorage.getItem('powerbiReportId');
        powerbiReportId = powerbiReportId.replace('\"', '');
        powerbiReportId = powerbiReportId.replace('\"', '');
         
        //CRES QA web site
         //$http.get('http://qacres4api.azurewebsites.net/api/report/GetReportByID?reportId=' + powerbiReportId)

        //Acore web site
        $http.get('http://acoreapi.azurewebsites.net/api/report/GetReportByID?reportId=' + powerbiReportId)
       
 .then(function (response) {
     debugger
     $scope.embedUrl = response.data.Report.embedUrl;
     $scope.accessToken = response.data.AccessToken;

     //$scope.embedUrl = response.data.Report.embedUrl;
     //$scope.accessToken = response.data.AccessToken;
     
 });
    });

    function getIframe() {
        $('#reportdiv').contents().find('iframe').addClass('reportiframe');
    }

</script>
