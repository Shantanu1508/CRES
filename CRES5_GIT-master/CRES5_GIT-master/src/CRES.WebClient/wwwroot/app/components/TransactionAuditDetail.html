<div class="col-sm-12">

    <div class="head">
        <h1 style="display: inline-block;margin-top: 10px;">Transactions Audit Detail</h1>
        <span>
            <span>
                <button class="custombutton" (click)="BackAuditSummary()">
                    Back
                </button>
            </span>
        </span>

</div>
    <div *ngIf="_dvEmptyNoteSearchMsg" class="alert alert-danger fade in" style="margin-top:18px;">
        <strong>No matching records found</strong>
    </div>
  

    <div class="fmst customlistpageheight">
        <div class="row MG0">
            <div class="col-sm-12 customgridpadding">

                <div class="cssload-container" *ngIf="_istranscationFetching">
                    <div class="cssload-whirlpool"></div>
                </div>


                <div class="clearfix"></div>

                <wj-flex-grid id="flextranscationaudit" #flextranscationaudit [itemsSource]="lsttranscationaudit" auto-generate-columns="true" allow-add-new="false" allow-sorting="true" showFilterIcons="true" class="wijmogridcss">
                    <!--<wj-flex-grid-column [header]="'Note Id'" [binding]="'CRENoteID'" [width]="'*'"></wj-flex-grid-column>-->
                    <wj-flex-grid-filter [filterColumns]="['TransactionType','DueDate','RemitDate','ServicingAmount','TotalRemit','SourceType','Status']"></wj-flex-grid-filter>
                    <wj-flex-grid-column [header]="'NoteID'" [isReadOnly]="true" [width]="80">
                        <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-cell="cell">
                            <div>
                                <a routerLink='/notedetail/{{cell.item.NoteID}}'  routerLinkActive="active">{{cell.item.CRENoteID}}</a>
                            </div>
                        </ng-template>
                    </wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Transaction Type'" [binding]="'TransactionType'" [width]="'*'"></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Due Date'" [binding]="'DueDate'" [width]="'*'" align="center"></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Transaction Date'" [binding]="'TransactionDate'"  [width]="'*'" align="center"></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Remit Date'" [binding]="'RemitDate'" [width]="'*'" align="center"></wj-flex-grid-column>

                    <wj-flex-grid-column [header]="'Servicing Amount'" [binding]="'ServicingAmount'" align="right" [width]="'*'"></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Total Remit'" [binding]="'TotalRemit'" align="right" [width]="'*'"></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Source Type'" [binding]="'SourceType'" align="center" [width]="'*'" ></wj-flex-grid-column>
                    <wj-flex-grid-column [header]="'Status'" [binding]="'Status'" align="center" [width]="'*'"></wj-flex-grid-column>

                </wj-flex-grid>
            </div>
        </div>
    </div>
</div>
