    <div style="transform: translateY(10%);display:inherit;">
        <div class="header_logo" align="center"> <a href="#">M61</a> </div>
        <div class="login custommarginlogin">
            <form #hf="ngForm">
                <h2>Reset Password</h2>
                <div class="cssload-container" *ngIf="_isLogin">
                    <div class="cssload-whirlpool"></div>
                </div>
                
                <div class="hr-label">
                    <span class="hr-label__text h4"></span>
                </div>
                <div class="form-group">
                    <input class="inputMaterial" type="password" [(ngModel)]="_changepasswrd.NewPassword" name="NewPassword" required #NewPassword="ngModel" placeholder="Password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[$@$!%*?&])[A-Za-z\d$@$!%*?&]{8,20}">
                    <div style="display:none" [hidden]="NewPassword.valid || NewPassword.untouched" class="alert alert-danger">
                        Password is required
                    </div>
                </div>
                <div class="form-group">
                    <input class="inputMaterial" type="password" [(ngModel)]="_changepasswrd.ConfirmPassword" name="ConfirmPassword" #ConfirmPassword="ngModel" required placeholder="Confirm Password">
                    <div style="display:none" [hidden]="ConfirmPassword.valid || ConfirmPassword.untouched" class="alert alert-danger">
                        Confirm password is required
                    </div>

                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-default" id="login" (click)="resetPassword()" [disabled]="!hf.form.valid">Reset Password</button>

                </div>
                <div class="alert alert-danger fade in">
                    <strong>Password must contain 8-20 characters, including at least 1 uppercase alphabet, 1 lowercase alphabet,  1 number and 1 special character (@,$,!,%,*,?,&).</strong>
                </div>
                <div *ngIf="_Showmessagediv" class="alert alert-danger fade in">
                    <strong>{{_errormessage}}</strong>
                </div>

            </form>
        </div>
    </div>
