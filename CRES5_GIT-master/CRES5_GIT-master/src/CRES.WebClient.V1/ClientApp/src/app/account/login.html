<div style="transform: translateY(10%);display:inherit;" *ngIf="!isloginsuccess">

  <div class="header_logo" align="center"> <a href="#">M612</a> </div>
  <div class="login custommarginlogin">
    <form #hf="ngForm">
      <h2>Login</h2>
      <div class="cssload-container" *ngIf="_isLogin"> 
        <div class="cssload-whirlpool"></div>
      </div>
      <div class="form-group">
        <button type="button" class="btn btn-social btn-microsoft" id="loginazure" (click)="logInazure()">
          Login using Azure AD
          <span class="fa fa-windows"></span>
        </button>
      </div>
      <div class="hr-label" *ngIf="_allowBasicLogin">
        <span class="hr-label__text h4">or</span>
      </div>
      <div class="form-group" *ngIf="_allowBasicLogin">

        <input class="inputMaterial" type="text" [(ngModel)]="_user.Login" name="login" required #login="ngModel" placeholder="Username" autofocus>
        <div style="display:none" [hidden]="login.valid || login.untouched" class="alert alert-danger">
          Username is required
        </div>

      </div>
      <div class="form-group" *ngIf="_allowBasicLogin">
        <input class="inputMaterial" type="password" [(ngModel)]="_user.Password" name="password" required #password="ngModel" placeholder="Password">
        <div style="display:none" [hidden]="password.valid || password.untouched" class="alert alert-danger">
          Password is required
        </div>

      </div>
      <div class="form-group" *ngIf="_allowBasicLogin">
        <button type="submit" class="btn btn-default" id="login" (click)="login()" [disabled]="!hf.form.valid">Login</button>

      </div>

      <div class="form-group">
        <a id="ctl00_ForgotPassword" class="forgot float-right" href="/#/forgotpassword">Forgot your password?</a>
      </div>
      <div *ngIf="_Showmessagediv" class="alert alert-danger fade in">
        <strong>{{Messageerror}}</strong>
      </div>
      <div *ngIf="_IsShowMessage" class="alert alert-success fade in" style="margin-top:5px">
        <strong>{{_SucessMsg}}</strong>
      </div>
    </form>
  </div>
</div>
