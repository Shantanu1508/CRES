<div class="col-sm-12">


  <div class="head fixheaderdiv">
    <h1 style="display: inline-block;margin-top: 10px;">Property List</h1>

  </div>



  <div *ngIf="_dvEmptyPropertySearchMsg == false" class="fmst fixheaderdiv">
    <div class="row MG0">
      <div *ngIf="_dvEmptyPropertySearchMsg" class="alert alert-danger fade in" style="margin-top:18px;">

        <strong>No matching records found</strong>
      </div>
      <div class="col-sm-12 customgridpadding">
        <!--<svg *ngIf="_isPropertyListFetching" class="spinner" width="25px" height="25px" viewBox="0 0 66 66"><circle class="circle" fill="none" stroke-width="6" stroke-linecap="round" cx="33" cy="33" r="30"></circle></svg>-->
        <div class="cssload-container" *ngIf="_isPropertyListFetching">
          <div class="cssload-whirlpool"></div>
        </div>

        <div class="clearfix"></div>

        <wj-flex-grid id="flex" #flex [itemsSource]="lstproperties" [allowResizing]="'Both'" auto-generate-columns="true" allow-add-new="true" allow-sorting="true" style="height:700px">

          <wj-flex-grid-filter #filter></wj-flex-grid-filter>
          <wj-flex-grid-column [header]="'Property name'" [binding]="'PropertyName'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Deal'" [binding]="'DealName'" [width]="300"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Address'" [binding]="'Address'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'City'" [binding]="'City'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'State'" [binding]="'State'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'UWNCF'" [binding]="'UWNCF'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Sqft'" [binding]="'SQFT'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Type'" [binding]="'PropertyTypeText'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Alloc debt per'" [binding]="'AllocDebtPer'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Sub type'" [binding]="'PropertySubtypeText'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Number of units or SF'" [binding]="'NumberofUnitsorSF'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Occ'" [binding]="'Occ'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Class'" [binding]="'Class'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Year built'" [binding]="'YearBuilt'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Renovated'" [binding]="'Renovated'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Buildings'" [binding]="'Bldgs'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Acres'" [binding]="'Acres'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Created date'" [binding]="'CreatedDate'"></wj-flex-grid-column>
        </wj-flex-grid>
      </div>
    </div>
  </div>

</div>
