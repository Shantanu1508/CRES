<form #f="ngForm">
  <div class="col-sm-12">
    <div class="head fixheaderdiv">
      <h1 style="display: inline-block;margin-top: 10px;">
        Dynamic Portfolio
      </h1>
      <span>
        <button class="custombutton" (click)="AddNewPortfolio()">
          Add Portfolio
        </button>

      </span>

      <div *ngIf="_ShowSuccessmessagediv" class="alert alert-success fade in">
        <strong>{{_ShowSuccessmessage}}</strong>
      </div>
      <div *ngIf="_Showmessagediv" class="alert alert-danger fade in">
        <strong>{{Message}}</strong>
      </div>


      <div class="cssload-container" *ngIf="_isPortfolioListFetching">
        <div class="cssload-whirlpool"></div>
      </div>

    </div>

    <!--<svg *ngIf="_isNoteListFetching" class="spinner" width="25px" height="25px" viewBox="0 0 66 66"><circle class="circle" fill="none" stroke-width="6" stroke-linecap="round" cx="33" cy="33" r="30"></circle></svg>-->


    <div class="fmst fixheadercontent">

      <div *ngIf="_isNoRecord" class="alert alert-danger fade in" style="margin-top:18px;">
        <!--<a href="#" class="close" data-dismiss="alert" aria-label="close" title="close">×</a>-->
        <strong>No matching records found</strong>
      </div>
      <div class="" *ngIf="!_isNoRecord">
        <div class="form-group row pD10">
          <div class="col-sm-12">
            <wj-flex-grid id="flexportfolio" #flexportfolio [itemsSource]="lstPortfolio" [allowResizing]="'Both'" auto-generate-columns="true" allow-add-new="true" allow-sorting="true" showFilterIcons="true" style="height:700px">
              <wj-flex-grid-filter #filter></wj-flex-grid-filter>
              <wj-flex-grid-column [header]="'Dynamic Portfolio Name'" [isReadOnly]="true" [width]="250">
                <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-cell="cell">
                  <div>
                    <a href='/#/portfoliodetail/{{cell.item.PortfolioMasterGuid}}' routerLinkActive="active">{{cell.item.PortfolioName}}</a>
                  </div>
                </ng-template>
              </wj-flex-grid-column>
              <wj-flex-grid-column [header]="'Description'" [binding]="'Description'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
              <wj-flex-grid-column [header]="'Show whole Deal'" [binding]="'AllowWholeDealText'" [isReadOnly]="true" [width]="'*'" align="left"></wj-flex-grid-column>
            </wj-flex-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
