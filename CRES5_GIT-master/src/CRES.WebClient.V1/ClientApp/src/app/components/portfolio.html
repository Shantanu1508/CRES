<div class="col-sm-12">
    <div class="head fixheaderdiv">
      <h1 style="display: inline-block;margin-top: 10px;">
        Dynamic Portfolio
      </h1>
      <span>
        <button class="custombutton" (click)="AddNewPortfolio()">
          Add Portfolio
        </button>

      </span>

      <div *ngIf="_ShowSuccessmessagediv" class="alert alert-success fade in">
        <strong>{{_ShowSuccessmessage}}</strong>
      </div>
     
    </div>


    <div class="table fixheadercontent">
      <div class="row MG0">
        <div class="col-sm-12 customgridpadding Porfoliolist">
          <div *ngIf="_isNoRecord" class="alert alert-danger fade in" style="margin-top:18px;">

            <strong>No matching records found</strong>
          </div>
          <div class="cssload-container" *ngIf="_isPortfolioListFetching">
            <div class="cssload-whirlpool"></div>
          </div>
          <div class="clearfix"></div>
          <div *ngIf="!_isNoRecord">
            <wj-flex-grid id="flexportfolio" #flexportfolio [itemsSource]="lstPortfolio" [allowResizing]="'Both'" auto-generate-columns="true" keyActionTab="Cycle"
                          allow-add-new="true" allow-sorting="true">
              <wj-flex-grid-filter #filter></wj-flex-grid-filter>
              <wj-flex-grid-column [header]="'Dynamic Portfolio Name'" [isReadOnly]="true" [width]="'*'">
                <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-cell="cell">
                  <div>
                    <a href='/#/portfoliodetail/{{cell.item.PortfolioMasterGuid}}' routerLinkActive="active">{{cell.item.PortfolioName}}</a>
                  </div>
                </ng-template>
              </wj-flex-grid-column>
              <wj-flex-grid-column [header]="'Description'" [binding]="'Description'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
              <wj-flex-grid-column [header]="'Show whole Deal'" [binding]="'AllowWholeDealText'" [isReadOnly]="true" [width]="'*'" align="left"></wj-flex-grid-column>
            </wj-flex-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
