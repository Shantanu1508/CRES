<div class="col-sm-12">

  <div class="head">
    <h1 style="display: inline-block;margin-top: 10px;"> Task List</h1>


    <button class="custombutton" (click)="AddNewTask()">
      Add Task
    </button>
    <span style="float:right">
      <input type="checkbox" id="chkdisplayclosed" (change)="Getclosedrecords()">
      <label style="display: inline-block;margin-top: 10px;">
        Display closed task
      </label>

    </span>



    <div *ngIf="_Showmessagediv" class="alert alert-success fade in">
      <strong>{{_ShowmessagedivMsg}}</strong>
    </div>


  </div>
  <div class="fmst customlistpageheight">
    <div class="row MG0">
      <div class="col-sm-12 customgridpadding">



        <div class="cssload-container" *ngIf="_TaskListFetching">
          <div class="cssload-whirlpool">

          </div>
        </div>


        <div class="clearfix"></div>

        <wj-flex-grid id="flex" #flex [itemsSource]="lstTask" [allowResizing]="'Both'" auto-generate-columns="true" allow-add-new="true" allow-sorting="true" showFilterIcons="true" class="wijmogridcss">
          <wj-flex-grid-filter #filter></wj-flex-grid-filter>
          <wj-flex-grid-column [header]="'Task ID'" [isReadOnly]="true" [width]="50">
            <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-cell="cell">
              <div>
                <a routerLink='/taskactivity/{{cell.item.TaskID}}' routerLinkActive="active">{{cell.item.TaskAutoID}}</a>
              </div>
            </ng-template>
          </wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Priority'" [binding]="'PriorityText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Task type'" [binding]="'TaskTypeText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Status'" [binding]="'StatusText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Summary'" [binding]="'Summary'" [isReadOnly]="true" [width]="120"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Description'" [binding]="'Description'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Category'" [binding]="'CategoryTag'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Subcategory'" [binding]="'SubCategoryTag'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Assigned to'" [binding]="'AssignedToText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Start date'" [binding]="'StartDate'" [isReadOnly]="true" align="right" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Deadline date'" [binding]="'DeadlineDate'" align="right" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Estimated completion date'" [binding]="'EstimatedCompletionDate'" align="right" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Actual completion date'" [binding]="'ActualCompletionDate'" align="right" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Tag 1'" [binding]="'Tag1'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Tag 2'" [binding]="'Tag2'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
          <wj-flex-grid-column [header]="'Tag 3'" [binding]="'Tag3'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
        </wj-flex-grid>
      </div>
    </div>
  </div>
</div>
