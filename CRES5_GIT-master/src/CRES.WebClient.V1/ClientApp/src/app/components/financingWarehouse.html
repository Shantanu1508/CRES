<div class="col-sm-12">

  <div class="head fixheaderdiv">
    <h1 style="display: inline-block;margin-top: 10px;">
      Financing

    </h1>
    <span *ngIf="!_isFinancingListFetching">
      <button class="custombutton" (click)="AddNewFinancing()">
        Add financing
      </button>
    </span>
    <div *ngIf="_Showmessagediv" class="alert alert-success fade in">
      <strong>{{_ShowmessagedivMsg}}</strong>
    </div>

  </div>



  <div class="table fixheadercontent">
    <div class="row MG0">
      <div class="col-sm-12 customgridpadding">
        <div *ngIf="_dvEmptyFinancingSearchMsg" class="alert alert-danger fade in" style="margin-top:18px;">

          <strong>No matching records found</strong>
        </div>
         <div class="cssload-container" *ngIf="_isFinancingListFetching">
          <div class="cssload-whirlpool"></div>
        </div>

        <div class="clearfix"></div>
        <div *ngIf="!_dvEmptyFinancingSearchMsg">
          <wj-flex-grid id="flex" #flex [itemsSource]="lstfinancingWarehouse" [allowResizing]="'Both'" auto-generate-columns="true" keyActionTab="Cycle" allow-add-new="true" allow-sorting="true">
            <wj-flex-grid-filter #filter></wj-flex-grid-filter>
            <wj-flex-grid-column [header]="'Name'">
              <ng-template wjFlexGridCellTemplate [cellType]="'Cell'" let-cell="cell">
                <div>
                  <a routerLink='/financingdetail/{{cell.item.FinancingWarehouseID}}' routerLinkActive="active">{{cell.item.Name}}</a>
                </div>
              </ng-template>
            </wj-flex-grid-column>
            <wj-flex-grid-column [header]="'Status'" [binding]="'StatusIDText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
            <wj-flex-grid-column [header]="'Is revolving'" [binding]="'IsRevolvingText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
            <wj-flex-grid-column [header]="'Base currency'" [binding]="'BaseCurrencyIDText'" [isReadOnly]="true" [width]="'*'"></wj-flex-grid-column>
            <wj-flex-grid-column [header]="'Origination fee'" [binding]="'OriginationFee'" [isReadOnly]="true" [width]="'*'" align="right" format="n2"></wj-flex-grid-column>
            <wj-flex-grid-column [header]="'Total constraint'" [binding]="'TotalConstraint'" [isReadOnly]="true" [width]="'*'" align="right" format="n2"></wj-flex-grid-column>
          </wj-flex-grid>
        </div>
      </div>
    </div>
  </div>
</div>
